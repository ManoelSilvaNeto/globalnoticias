name: Atualizar e publicar

on:
  schedule:
    - cron: '0 */4 * * *' # a cada 4h (UTC)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'docs/**'
      - '**/*.md'

permissions:
  contents: write

# Evita runs sobrepostos (o agendado + um push manual, por ex.).
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Disponibiliza os segredos do Cloudflare como env p/ a condição do deploy.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Testes
        run: pnpm test

      - name: Rodar pipeline (coleta + cluster + resumo + dados)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pnpm pipeline

      - name: Commitar dados (se mudaram)
        run: |
          git config user.name "globalnoticias-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data; then
            echo "Sem mudanças em data/ — nada a commitar."
          else
            git add data
            git commit -m "dados: edição $(date -u +%FT%TZ) [skip ci]"
            git push
          fi

      - name: Build do site
        run: pnpm build

      - name: Deploy no Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          # Cria o projeto Pages no 1º deploy (idempotente: ignora se já existe).
          pnpm dlx wrangler@latest pages project create globalnoticias --production-branch=main || true
          pnpm dlx wrangler@latest pages deploy dist --project-name=globalnoticias --branch=main

      - name: Avisar buscadores (IndexNow — Bing/Yandex)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: pnpm tsx pipeline/indexnow.ts

      - name: Divulgar nas redes (Telegram/Bluesky/Mastodon)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
        run: pnpm tsx pipeline/social.ts

      - name: Commitar estado social (se mudou)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          git config user.name "globalnoticias-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/social.json; then
            echo "Sem novidades sociais — nada a commitar."
          else
            git add data/social.json
            git commit -m "social: estado de divulgação $(date -u +%FT%TZ) [skip ci]"
            git push
          fi
